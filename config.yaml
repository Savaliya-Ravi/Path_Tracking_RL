env:
  max_steps: 4000
  n_waypoints: 40
  waypoint_threshold: 0.25
  arena_limit: 3.0
  waypoint_spacing: 0.3
  path_type: "figure8"

training:
  total_timesteps: 2000000
  n_envs: 4
  seed: 42
  eval_freq: 20000

ppo:
  n_steps: 2048
  batch_size: 128
  n_epochs: 10
  gamma: 0.995
  learning_rate: 0.0003
  ent_coef: 0.01
  clip_range: 0.2
